<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">브라우저에서 바로 플레이</p>
    </header>

    <main class="game-container">
      <aside class="panel panel-left">
        <div class="stat-box">
          <span class="stat-label">점수</span>
          <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">레벨</span>
          <span id="level" class="stat-value">1</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">라인</span>
          <span id="lines" class="stat-value">0</span>
        </div>
      </aside>

      <div class="board-wrapper">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay" class="overlay hidden">
          <div class="overlay-content">
            <h2 id="overlay-title">테트리스</h2>
            <p id="overlay-message">스페이스 또는 Enter로 시작</p>
            <button id="start-btn" class="btn">시작</button>
          </div>
        </div>
      </div>

      <aside class="panel panel-right">
        <div class="preview-box">
          <span class="stat-label">다음</span>
          <canvas id="next" width="120" height="120"></canvas>
        </div>
        <div class="preview-box">
          <span class="stat-label">홀드</span>
          <canvas id="hold" width="120" height="120"></canvas>
        </div>
        <div class="controls-info">
          <h3>조작법</h3>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> 이동</li>
            <li><kbd>↓</kbd> 소프트 드롭</li>
            <li><kbd>↑</kbd> 회전</li>
            <li><kbd>Space</kbd> 하드 드롭</li>
            <li><kbd>C</kbd> 홀드</li>
            <li><kbd>P</kbd> 일시정지</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="js/tetrominoes.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
