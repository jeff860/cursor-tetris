<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2인용 테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>2인용 테트리스</h1>
    </header>

    <main class="game-container">
      <!-- Player 1 -->
      <section class="player-zone">
        <h2>1P (Numpad)</h2>
        <div class="board-wrapper">
          <canvas id="board-1" width="300" height="600"></canvas>
        </div>
        <div class="panel">
          <div class="stat-box">점수: <span id="score-1">0</span></div>
        </div>
      </section>

      <!-- Player 2 -->
      <section class="player-zone">
        <h2>2P (WASD)</h2>
        <div class="board-wrapper">
          <canvas id="board-2" width="300" height="600"></canvas>
        </div>
        <div class="panel">
          <div class="stat-box">점수: <span id="score-2">0</span></div>
        </div>
      </section>
    </main>

    <div id="overlay" class="overlay">
      <div class="overlay-content">
        <h2>2인용 테트리스</h2>
        <button id="start-btn" class="btn">시작</button>
      </div>
    </div>
  </div>

  <script src="js/tetrominoes.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
